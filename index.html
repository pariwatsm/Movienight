<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Movie date? 👀🎬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fff3ee;
    --blush:#ffd9e6;
    --rose:#ff7fa8;
    --deep:#b03a5b;
    --ink:#4a2a36;
    --gold:#ffcf6a;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at 20% 20%, var(--cream), var(--blush) 70%);
    font-family: 'Sarabun', 'Segoe UI', system-ui, sans-serif;
  }
  .screen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
    transition: opacity .6s ease, transform .6s ease;
  }
  .hidden{
    opacity:0;
    pointer-events:none;
    transform: scale(0.95);
  }
  h1{
    font-family: 'Mali', 'Georgia', serif;
    font-weight: 700;
    font-size: clamp(28px, 6vw, 48px);
    color: var(--deep);
    margin: 0 0 8px;
    line-height: 1.3;
  }
  .sub{
    color: var(--ink);
    opacity:.75;
    margin-bottom: 36px;
    font-size: clamp(14px, 2.5vw, 18px);
  }
  .btn-row{
    position:relative;
    display:flex;
    gap:28px;
    align-items:center;
    justify-content:center;
    min-height: 160px;
    width: 100%;
    max-width: 360px;
  }
  button{
    border:none;
    font-size:20px;
    font-weight:600;
    padding:16px 42px;
    border-radius:999px;
    cursor:pointer;
    transition: transform .12s ease-out, box-shadow .2s ease;
    font-family: inherit;
  }
  #yes{
    background: var(--rose);
    color:white;
    box-shadow: 0 8px 20px rgba(255,127,168,.5);
    animation: pulse 1.6s ease-in-out infinite;
  }
  #yes:hover{ transform: scale(1.08); }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 8px 20px rgba(255,127,168,.5); }
    50%{ box-shadow: 0 8px 30px rgba(255,127,168,.8); }
  }
  #no{
    position:fixed;
    background: white;
    color: var(--deep);
    border: 2px solid var(--blush);
    z-index: 50;
    will-change: left, top;
  }
  .no-spacer{
    visibility:hidden;
    pointer-events:none;
  }
  .hearts span{
    position:absolute;
    font-size: 22px;
    opacity:.6;
    animation: float 6s ease-in-out infinite;
    color: var(--rose);
  }
  @keyframes float{
    0%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-22px) rotate(8deg); }
    100%{ transform: translateY(0) rotate(0deg); }
  }

  /* page 2 */
  #yesPage{ }
  .ticket{
    background: white;
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 20px 50px rgba(176,58,91,.25);
    max-width: 420px;
    position: relative;
    overflow:hidden;
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    width: 28px; height: 28px;
    background: var(--blush);
    border-radius:50%;
    top: 50%;
    transform: translateY(-50%);
  }
  .ticket::before{ left:-14px; }
  .ticket::after{ right:-14px; }
  .ticket h2{
    font-family: 'Mali', Georgia, serif;
    font-weight: 700;
    color: var(--deep);
    margin: 0 0 6px;
    font-size: 26px;
  }
  .ticket p.note{
    color: var(--ink);
    opacity:.8;
    margin-bottom: 22px;
    font-size:15px;
  }
  .field{
    text-align:left;
    margin-bottom: 16px;
  }
  .field label{
    display:block;
    font-size:12px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color: var(--deep);
    opacity:.7;
    margin-bottom:5px;
  }
  .field select, .field input{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1.5px solid var(--blush);
    font-size:15px;
    font-family:inherit;
    background:var(--cream);
    color: var(--ink);
  }
  .field select:focus, .field input:focus{
    outline:none;
    border-color:var(--rose);
  }
  .confirm{
    margin-top: 8px;
    width:100%;
    background: var(--rose);
    color:white;
    padding:14px;
    border-radius:14px;
    font-size:17px;
  }
  .confirm:hover{ transform: translateY(-2px); }
  .result{
    margin-top:18px;
    font-size:15px;
    color: var(--deep);
    font-weight:600;
    display:none;
  }
  .emoji-row{ font-size:28px; margin-bottom:10px; }

  /* receipt result */
  .receipt-overlay{
    position:fixed;
    inset:0;
    background: rgba(74,42,54,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 200;
    opacity:0;
    pointer-events:none;
    transition: opacity .35s ease;
  }
  .receipt-overlay.show{
    opacity:1;
    pointer-events:auto;
  }
  .receipt{
    width: 290px;
    max-height: 86vh;
    overflow-y:auto;
    background: #fffdf8;
    color: #2b2b2b;
    font-family: 'Courier New', monospace;
    padding: 26px 22px 22px;
    box-shadow: 0 25px 60px rgba(0,0,0,.35);
    position: relative;
    transform: translateY(40px) scale(.9) rotate(-1deg);
    transition: transform .45s cubic-bezier(.2,.9,.25,1.2);
    clip-path: polygon(
      0% 2%, 4% 0%, 8% 2%, 12% 0%, 16% 2%, 20% 0%, 24% 2%, 28% 0%, 32% 2%, 36% 0%,
      40% 2%, 44% 0%, 48% 2%, 52% 0%, 56% 2%, 60% 0%, 64% 2%, 68% 0%, 72% 2%, 76% 0%,
      80% 2%, 84% 0%, 88% 2%, 92% 0%, 96% 2%, 100% 0%,
      100% 98%, 96% 100%, 92% 98%, 88% 100%, 84% 98%, 80% 100%, 76% 98%, 72% 100%,
      68% 98%, 64% 100%, 60% 98%, 56% 100%, 52% 98%, 48% 100%, 44% 98%, 40% 100%,
      36% 98%, 32% 100%, 28% 98%, 24% 100%, 20% 98%, 16% 100%, 12% 98%, 8% 100%, 4% 98%, 0% 100%
    );
  }
  .receipt-overlay.show .receipt{
    transform: translateY(0) scale(1) rotate(-1deg);
  }
  .receipt h3{
    font-family: 'Mali', cursive;
    font-size: 30px;
    font-weight:700;
    text-align:center;
    letter-spacing: 1px;
    margin: 0 0 2px;
    color:#2b2b2b;
  }
  .receipt .tagline{
    text-align:center;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:14px;
    color:#555;
  }
  .receipt .order-line{
    font-size:12px;
    line-height:1.6;
    margin-bottom: 8px;
  }
  .receipt hr{
    border:none;
    border-top: 1.5px dashed #888;
    margin: 10px 0;
  }
  .receipt table{
    width:100%;
    font-size:12px;
    border-collapse:collapse;
  }
  .receipt table th{
    text-align:left;
    font-weight:700;
    padding-bottom:6px;
    border-bottom: 1.5px dashed #888;
  }
  .receipt table th:last-child, .receipt table td:last-child{
    text-align:right;
  }
  .receipt table td{
    padding: 5px 0;
    vertical-align:top;
  }
  .receipt .qty-col{ width: 26px; }
  .receipt .total-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    font-weight:700;
    margin-top: 6px;
  }
  .receipt .thanks{
    text-align:center;
    font-size:13px;
    margin: 16px 0 10px;
    line-height:1.5;
  }
  .receipt .barcode{
    display:flex;
    justify-content:center;
    gap:2px;
    margin: 10px 0 4px;
    height: 40px;
    align-items:flex-end;
  }
  .receipt .barcode span{
    width:2px;
    background:#2b2b2b;
  }
  .receipt .site{
    text-align:center;
    font-size:11px;
    letter-spacing:1px;
    color:#555;
  }
  .receipt-close{
    display:block;
    margin: 18px auto 0;
    background: var(--rose);
    color:white;
    border:none;
    border-radius:999px;
    padding: 10px 28px;
    font-size:14px;
    font-family: 'Sarabun', sans-serif;
    cursor:pointer;
  }
  .receipt-close:hover{ transform: translateY(-1px); }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>

  <!-- Floating hearts background -->
  <div class="hearts" aria-hidden="true">
    <span style="top:10%; left:8%; animation-delay:0s;">💖</span>
    <span style="top:75%; left:12%; animation-delay:1.2s;">🎬</span>
    <span style="top:20%; left:85%; animation-delay:.6s;">🍿</span>
    <span style="top:80%; left:80%; animation-delay:2s;">💕</span>
    <span style="top:50%; left:5%; animation-delay:1.6s;">🎟️</span>
  </div>

  <!-- Page 1 -->
  <div class="screen" id="askPage">
    <div class="emoji-row">🎬🍿</div>
    <h1>ไปดูหนังกันมั้ยคับ? 🥺</h1>
    <p class="sub">ดูหนังน่ารักๆ หนังผีฟิรๆ(กัวๆๆๆ)😱 ไปกินข้าวอร่อยๆกันน้าา🍛 🥹💕</p>
    <div class="btn-row">
      <button id="yes" onclick="sayYes()">ไปสิ! 💕</button>
      <button class="no-spacer" aria-hidden="true">ไม่ไป!</button>
    </div>
    <button id="no">ไม่ไป!</button>
  </div>

  <!-- Page 2 -->
  <div class="screen hidden" id="yesPage">
    <div class="ticket">
      <div class="emoji-row">🎉🎟️</div>
      <h2>Yayyyy It's a date!</h2>
      <p class="note">โปรดเลือกสิ่งที่คุณต้องการ😊</p>

      <div class="field">
        <label for="movieType">ดูหนังอะไรดีคับ?</label>
        <select id="movieType">
          <option>Toy Story 5 🧸</option>
          <option>Supergirl 🦸‍♀️</option>
          <option>Obsession 👻</option>
          <option>ยึดร่างคลั่ง 🧟</option>
        </select>
      </div>

      <div class="field">
        <label for="when">วันไหนดีน้า?</label>
        <select id="when">
          <option>เสาร์</option>
          <option>อาทิตย์</option>
          <option>สัปดาห์หน้า</option>
          <option>เมื่อไหร่ก็ได้ที่ว่าง</option>
        </select>
      </div>

      <div class="field">
        <label for="snack">ของกินที่อยากกินน? 🍿</label>
        <input type="text" id="snack" placeholder="เช่นตี๋น้อย บอนชอน ซูชิโระ">
      </div>

      <button class="confirm" onclick="confirmDate()">ยืนยัน 💌</button>
    </div>
  </div>

  <!-- Receipt overlay -->
  <div class="receipt-overlay" id="receiptOverlay">
    <div class="receipt" id="receiptCard">
      <h3>DATE-RECIEPT</h3>
      <div class="tagline">our movie night</div>
      <div class="order-line" id="orderLine"></div>
      <hr>
      <table>
        <tr><th class="qty-col">QTY</th><th>ITEM</th><th></th></tr>
        <tbody id="receiptRows"></tbody>
      </table>
      <hr>
      <div class="total-row"><span>TOTAL :</span><span>∞</span></div>
      <div class="thanks">เจอกันค้าบอ้วงง 💕</div>
      <div class="barcode" id="barcode"></div>
      <button class="receipt-close" onclick="closeReceipt()">ปิด</button>
    </div>
  </div>

<script>
  const noBtn = document.getElementById('no');
  const noSpacer = document.querySelector('.no-spacer');

  function placeNoOverSpacer(){
    const rect = noSpacer.getBoundingClientRect();
    noBtn.style.left = rect.left + 'px';
    noBtn.style.top = rect.top + 'px';
  }
  placeNoOverSpacer();
  window.addEventListener('resize', placeNoOverSpacer);
  window.addEventListener('load', placeNoOverSpacer);

  const getRandomNumber = (max) => Math.floor(Math.random() * (max + 1));

  function dodge(){
    const padding = 12;
    const maxLeft = window.innerWidth - noBtn.offsetWidth - padding;
    const maxTop = window.innerHeight - noBtn.offsetHeight - padding;

    const left = Math.max(padding, getRandomNumber(maxLeft));
    const top = Math.max(padding, getRandomNumber(maxTop));

    anime({
      targets: noBtn,
      left: `${left}px`,
      top: `${top}px`,
      duration: 550,
      easing: 'easeOutCirc'
    });
  }

  ['mouseover', 'click', 'touchstart'].forEach(evt => {
    noBtn.addEventListener(evt, function(e){
      if(evt === 'touchstart') e.preventDefault();
      dodge();
    });
  });

  function sayYes(){
    document.getElementById('askPage').classList.add('hidden');
    document.getElementById('yesPage').classList.remove('hidden');
  }

  function confirmDate(){
    const movie = document.getElementById('movieType').value;
    const when = document.getElementById('when').value;
    const snackInput = document.getElementById('snack').value;
    const snack = snackInput || 'แค่มีเธอก็พอ';

    const now = new Date();
    const dateStr = now.toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    const orderNum = String(Math.floor(Math.random()*900)+100);

    document.getElementById('orderLine').innerHTML =
      `ORDER #${orderNum} FOR น้องตูน<br>${dateStr}`;

    const items = [
      { qty:'01', name: movie },
      { qty:'02', name: 'ดูวันไหน: ' + when },
      { qty:'03', name: 'ของกิน: ' + snack },
      { qty:'04', name: 'พี่กำปั้น' },
      { qty:'05', name: 'น้องตูน' }
    ];

    const rowsHtml = items.map(it =>
      `<tr><td>${it.qty}</td><td>${it.name}</td><td>1</td></tr>`
    ).join('');
    document.getElementById('receiptRows').innerHTML = rowsHtml;

    // build random-height barcode bars
    const barcode = document.getElementById('barcode');
    barcode.innerHTML = '';
    for(let i=0;i<40;i++){
      const bar = document.createElement('span');
      const h = 18 + Math.random()*22;
      bar.style.height = h + 'px';
      barcode.appendChild(bar);
    }

    const overlay = document.getElementById('receiptOverlay');
    overlay.classList.add('show');
  }

  function closeReceipt(){
    document.getElementById('receiptOverlay').classList.remove('show');
  }
</script>
</body>
</html>
